@if (isOpen()) {
  <!-- Backdrop -->
  <div class="modal-backdrop fade show"></div>

  <!-- Modal Wrapper -->
  <div class="modal fade show d-block" tabindex="-1" role="dialog" aria-labelledby="confirmModalLabel" aria-hidden="false">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-danger" id="confirmModalLabel" >{{ title() }}</h5>
        </div>
        <div class="modal-body">
          <p class="m-0 text-danger">{{ message() }}</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" (click)="onConfirmOk()"><i class="fas fa-check"></i> Ok</button>
        </div>
      </div>
    </div>
  </div>
}
