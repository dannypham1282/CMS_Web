<div class="sidebar" [class.collapsed]="collapsed">

  <div class="sidebar-header">
    <i class="fas fa-layer-group"></i>
@if(!collapsed)
{
    <span>
      Admin Portal
    </span>
  }
  </div>

  <ul class="menu-list">
@for (item of menuItems;track item.title)
{
    <app-sidebar-item
      [item]="item"
      [collapsed]="collapsed">
    </app-sidebar-item>
  }

  </ul>

</div>
