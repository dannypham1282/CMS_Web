<ul class="nav nav-tabs">
    @for (item of mytabs; track $index) {
        @if (item.active)   {
             <li aria-selected="true" class="nav-link active" aria-current="page" href="#" data-bs-toggle="tab" [attr.data-bs-target]="'#' + item.id" (click)="selectTab(item)" [id]="'tabId_' + item.id">{{ item.title }}{{ item.id }}
                <a href="#" (click)="closeTab(item)" class="tab-close"><span class="ms-1">x</span></a>
            </li>
        } @else {
    <li aria-selected="false" [class]="item.active ? 'nav-link active' : 'nav-link tab-menu-item'" aria-current="page" href="#" data-bs-toggle="tab" [attr.data-bs-target]="'#' + item.id" (click)="selectTab(item)" [id]="'tabId_' + item.id">{{ item.title }}{{ item.id }}
        <a href="#" (click)="closeTab(item)" class="tab-close"><span class="ms-1">x</span></a>
    </li>
    }
}
</ul>
<div class="tab-content" stlyle="width: 100%; height: 100%;">
     @for (item of mytabs; track $index) {
   <div [class]="'tab-pane fade show' + (item.active ? ' active' : '')" [attr.id]="item.id" role="tabpanel" [attr.aria-labelledby]="item.id + '-tab'" style="width: 100%; height: 100%;">
        @if (item.component) {
            <ng-container *ngComponentOutlet="item.component; inputs: item.data"></ng-container>
        }         
   </div>
    }
</div>
