 <div class="tab-content">
 <div class="row mb-2">
     <div class="col col-md-12 mb-12">
     <button class="btn btn-sm btn-outline-primary" [disabled]="isAddingNewRow" (click)="addNewRecord()"><i class="fa fa-plus"></i>Add &nbsp;</button>
     &nbsp;<button class="btn btn-sm btn-outline-primary"  (click)="refreshGrid()"><i class="fa fa-refresh"></i>Refresh &nbsp;</button>
   </div> 
</div>
 <div class="row">
     
      <!-- The AG Grid component, with Dimensions, CSS Theme, Row Data, and Column Definition -->
      <ag-grid-angular
        [gridId]="myGrid"
        [id]="myGrid"
         class="ag-theme-quartz"
        style="height: 300px;width:100%;"
         [theme]="theme"
  [rowHeight]="rowHeight"    
        [rowData]="rowData"
        [columnDefs]="colDefs"
        [defaultColDef]="defaultColDef"
        (gridReady)="onGridReady($event)"
         (cellValueChanged)="onCellValueChanged($event)"></ag-grid-angular>
    </div>
    </div>
