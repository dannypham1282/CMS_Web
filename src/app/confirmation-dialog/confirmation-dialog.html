@if (isOpen()) {
  <!-- Backdrop -->
  <div class="modal-backdrop fade show"></div>

  <!-- Modal Wrapper -->
  <div class="modal fade show d-block" tabindex="-1" role="dialog" aria-labelledby="confirmModalLabel" aria-hidden="false">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmModalLabel">{{ title() }}</h5>
          <button type="button" class="btn-close" aria-label="Close" (click)="onCancel()"></button>
        </div>
        <div class="modal-body">
          <p class="m-0">{{ message() }}</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="onCancel()"><i class="fas fa-times"></i> Cancel</button>
          <button type="button" class="btn btn-danger" (click)="onConfirm()"><i class="fas fa-check"></i> Confirm</button>
        </div>
      </div>
    </div>
  </div>
}
